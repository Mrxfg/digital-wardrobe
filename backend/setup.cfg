[flake8]
max-line-length = 127
extend-ignore = E203, W503, E501
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    .eggs,
    *.egg,
    migrations

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --verbose
    --cov=app
    --cov-report=term-missing
    --cov-report=html

[coverage:run]
omit =
    */tests/*
    */migrations/*
    */__pycache__/*
    .venv/*

[isort]
profile = black
line_length = 127
skip = .venv,venv,migrations
