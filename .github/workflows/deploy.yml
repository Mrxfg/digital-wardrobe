name: Deploy to Production

on:
  workflow_dispatch:  # Manual trigger only - run when you're ready to deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production  # Requires approval in GitHub settings

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Verify secrets are configured
      run: |
        if [ -z "${{ secrets.SERVER_HOST }}" ]; then
          echo "❌ Error: SERVER_HOST secret is not configured"
          echo "Please configure deployment secrets in GitHub Settings"
          exit 1
        fi

    - name: Deploy to Server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          cd /path/to/digital-wardrobe
          git pull origin main
          cd backend
          source .venv/bin/activate
          pip install -r requirements.txt
          # Run database migrations if using Alembic
          # alembic upgrade head
          sudo systemctl restart digital-wardrobe
          echo "✓ Deployment completed successfully"

    - name: Health Check
      run: |
        sleep 10
        curl -f ${{ secrets.APP_URL }}/health || echo "Warning: Health check failed"

    - name: Notify Deployment Status
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✓ Deployment successful"
        else
          echo "✗ Deployment failed"
        fi
