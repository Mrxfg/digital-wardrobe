name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        cd backend
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 black pytest pytest-cov

    - name: Lint with flake8
      run: |
        cd backend
        # Stop the build if there are Python syntax errors or undefined names
        flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check code formatting with black
      run: |
        cd backend
        black --check app

    - name: Compile all Python files
      run: |
        cd backend
        python -m py_compile app/**/*.py || python -m compileall app/

    - name: Security check - Verify no hardcoded secrets
      run: |
        cd backend
        ! grep -r "password\s*=\s*['\"]" app/ || echo "Warning: Potential hardcoded password found"
        ! grep -r "secret\s*=\s*['\"]" app/ || echo "Warning: Potential hardcoded secret found"

  build-check:
    runs-on: ubuntu-latest
    needs: lint-and-test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        cd backend
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create uploads directory
      run: |
        cd backend
        mkdir -p uploads/original uploads/processed

    - name: Test application imports
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        SECRET_KEY: test-secret-key-for-ci-only
        ALGORITHM: HS256
      run: |
        cd backend
        python -c "from app.main import app; print('✓ Application imports successfully')"

    - name: Check database models
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        SECRET_KEY: test-secret-key-for-ci-only
        ALGORITHM: HS256
      run: |
        cd backend
        python -c "from app.database import Base, engine; Base.metadata.create_all(bind=engine); print('✓ Database models created successfully')"

  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install safety
      run: pip install safety

    - name: Check for security vulnerabilities
      run: |
        cd backend
        safety check --file requirements.txt --continue-on-error || echo "Security vulnerabilities found - please review"
